<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2830"/>
      <stop offset="100%" stop-color="#151e24"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Geometric accent: small triangle -->
  <polygon points="26,5 29,10 23,10" fill="#2E856E" opacity="0.5"/>
  <!-- Geometric accent: diamond -->
  <rect x="3" y="22" width="5" height="5" rx="0.5" transform="rotate(45 5.5 24.5)" fill="#FFD700" opacity="0.35"/>
  <!-- CV monogram -->
  <text x="16" y="21.5" text-anchor="middle" font-family="monospace" font-weight="700" font-size="14" fill="#FFFFFF" letter-spacing="-0.5">CV</text>
</svg>
